<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mac Portfolio</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  height: 100vh;
  overflow: hidden;
  color: white;

  background: url("back.jpg") no-repeat center center;
  background-size: cover;
}

/* SPLASH */
#splash {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgb(98, 97, 97);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.logo img {
  width: 90px;
  animation: fadeIn 1.5s ease;
}

.loader {
  width: 200px;
  height: 5px;
  background: #333;
  margin-top: 20px;
}

.bar {
  height: 100%;
  width: 0%;
  background: white;
  animation: loading 3s forwards;
}

@keyframes loading { to { width: 100%; } }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

/* TOP BAR */
.topbar {
  height: 30px;
  display: flex;
  justify-content: space-between;
  padding: 5px 15px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(20px);
}

/* DESKTOP */
.desktop-icons {
  position: absolute;
  top: 60px;
  left: 20px;
  display: flex;
  flex-direction: column;
  gap: 25px;
}

.icon {
  text-align: center;
  cursor: pointer;
}

.icon img {
  width: 60px;
  border-radius: 14px;
  padding: 6px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  transition: 0.25s;
}

.icon:hover img {
  transform: scale(1.2) translateY(-5px);
}

.icon p {
  font-size: 12px;
}

/* DOCK */
.dock {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  padding: 12px 25px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(25px);
  border-radius: 30px;
  display: flex;
  gap: 20px;
}

.dock img {
  width: 60px;
  cursor: pointer;
  transition: 0.3s;
}

.dock img:hover {
  transform: scale(1.3);
}

/* WINDOWS */
.window {
  position: absolute;
  width: 80vw;
  height: 80vh;
  max-width: 1000px;
  max-height: 700px;

  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(25px);

  border-radius: 16px;
  display: none;
  flex-direction: column;
  overflow: hidden;

  box-shadow: 0 10px 40px rgba(0,0,0,0.3);
}

.window-header {
  padding: 10px;
  background: rgba(255,255,255,0.05);
  display: flex;
  justify-content: space-between;
  cursor: move;
}

.window-body {
  flex: 1;
  padding: 10px;
  overflow: auto;
}

/* TERMINAL */
#terminalInput {
  padding: 10px;
  background: black;
  color: white;
  border: none;
}

/* CHROME */
.chrome-nav {
  display: flex;
  gap: 5px;
  padding: 5px;
}

#urlBar {
  flex: 1;
  padding: 8px;
  border-radius: 20px;
  border: none;
}

iframe {
  flex: 1;
  border: none;
}

/* BUTTON */
button {
  background: rgba(255,255,255,0.1);
  border: none;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}
</style>

</head>

<body>

<!-- SPLASH -->

<div id="splash">
  <div class="logo">
    <img src="logo.png">
  </div>
  <div class="loader"><div class="bar"></div></div>
</div>

<audio id="bootSound" src="startup.mp3"></audio>

<!-- TOPBAR -->

<div class="topbar">
  <div>Agesh K S</div>
  <div id="time"></div>
</div>

<!-- DESKTOP -->

<div class="desktop-icons">

  <div class="icon" onclick="openApp('terminal')">
    <img src="https://img.icons8.com/fluency/96/console.png">
    <p>Terminal</p>
  </div>

  <div class="icon" onclick="openApp('chrome')">
    <img src="https://img.icons8.com/fluency/96/chrome.png">
    <p>Chrome</p>
  </div>

  <div class="icon" onclick="openApp('finder')">
    <img src="https://img.icons8.com/fluency/96/folder-invoices.png">
    <p>Finder</p>
  </div>

  <div class="icon" onclick="openApp('cvWindow')">
    <img src="https://img.icons8.com/fluency/96/pdf.png">
    <p>My CV</p>
  </div>

</div>

<!-- TERMINAL -->

<div class="window" id="terminal">
  <div class="window-header" onmousedown="drag(event,this.parentElement)">
    Terminal <button onclick="closeApp('terminal')">✖</button>
  </div>
  <div id="terminalOutput" class="window-body">
    <p>> Welcome</p>
  </div>
  <input id="terminalInput">
</div>

<!-- FINDER -->

<div class="window" id="finder">
  <div class="window-header" onmousedown="drag(event,this.parentElement)">
    Finder <button onclick="closeApp('finder')">✖</button>
  </div>
  <div class="window-body">
    <p>🚀 Travel App</p>
    <p>🎮 Jet Game</p>
  </div>
</div>

<!-- CHROME -->

<div class="window" id="chrome">
  <div class="window-header" onmousedown="drag(event,this.parentElement)">
    Chrome <button onclick="closeApp('chrome')">✖</button>
  </div>

  <div class="chrome-nav">
    <button onclick="goBack()">←</button>
    <button onclick="goForward()">→</button>
    <button onclick="refreshPage()">⟳</button>
    <input id="urlBar" placeholder="Search or enter website">
  </div>

  <iframe id="browser"></iframe>
</div>

<!-- CV -->

<div class="window" id="cvWindow">
  <div class="window-header" onmousedown="drag(event,this.parentElement)">
    My CV
    <div>
      <button onclick="downloadCV()">⬇</button>
      <button onclick="closeApp('cvWindow')">✖</button>
    </div>
  </div>
  <iframe src="Ageshks.pdf"></iframe>
</div>

<!-- DOCK -->

<div class="dock">
  <img src="https://img.icons8.com/fluency/96/console.png" onclick="openApp('terminal')">
  <img src="https://img.icons8.com/fluency/96/chrome.png" onclick="openApp('chrome')">
</div>

<script>
setInterval(()=>time.innerText=new Date().toLocaleTimeString(),1000);

function openApp(id){ document.getElementById(id).style.display="flex"; }
function closeApp(id){ document.getElementById(id).style.display="none"; }

function drag(e,el){
  let x=e.clientX-el.offsetLeft,y=e.clientY-el.offsetTop;
  function move(ev){ el.style.left=ev.pageX-x+"px"; el.style.top=ev.pageY-y+"px";}
  document.addEventListener("mousemove",move);
  document.onmouseup=()=>document.removeEventListener("mousemove",move);
}

terminalInput.addEventListener("keydown",e=>{
  if(e.key==="Enter"){
    let cmd=e.target.value;
    terminalOutput.innerHTML+=`<p>> ${cmd}</p>`;
    if(cmd==="open chrome") openApp("chrome");
    e.target.value="";
  }
});

urlBar.addEventListener("keydown",e=>{
  if(e.key==="Enter"){
    let v=urlBar.value;
    browser.src=v.includes(".")? (v.startsWith("http")?v:"https://"+v)
    :"https://www.bing.com/search?q="+encodeURIComponent(v);
  }
});

function goBack(){ browser.contentWindow.history.back();}
function goForward(){ browser.contentWindow.history.forward();}
function refreshPage(){ browser.contentWindow.location.reload();}

function downloadCV(){
  const a=document.createElement("a");
  a.href="Ageshks.pdf";
  a.download="Ageshks.pdf";
  a.click();
}

window.onload=()=>{
  setTimeout(()=>document.getElementById("splash").style.display="none",3000);
  setTimeout(()=>bootSound.play().catch(()=>{}),500);
};
</script>

</body>
</html>
