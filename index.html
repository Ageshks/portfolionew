<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mac Portfolio</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  height: 100vh;
  overflow: hidden;
  color: white;
  background: url("back.jpg") no-repeat center center;
  background-size: cover;
}

/* SPLASH */
#splash {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgb(104, 103, 103);
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 9999;
  transition: opacity 0.5s;
}
.logo img { width: 90px; }
.loader { width: 200px; height: 5px; background: #333; margin-top:20px;}
.bar { height:100%; width:0; background:white; animation:loading 3s forwards;}
@keyframes loading { to{width:100%;} }

/* TOPBAR */
.topbar {
  height:30px;
  display:flex;
  justify-content:space-between;
  padding:5px 15px;
  background:rgba(255,255,255,0.08);
  backdrop-filter: blur(20px);
}

/* ICONS */
.desktop-icons {
  position:absolute;
  top:60px;
  left:20px;
  display:flex;
  flex-direction:column;
  gap:25px;
}
.icon { text-align:center; cursor:pointer; }
.icon img {
  width:40px;
  border-radius:14px;
  padding:4px;
  background:rgba(255,255,255,0.1);
}
.icon:hover img { transform:scale(1.2); }

/* DOCK */
.dock {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  padding:12px 25px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(20px);
  border-radius:30px;
  display:flex;
  gap:20px;
}
.dock img { width:60px; }

/* WINDOWS */
.window {
  position:absolute;
  width:80vw;
  height:80vh;
  max-width:1000px;
  max-height:700px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(25px);
  border-radius:16px;
  display:none;
  flex-direction:column;
  z-index:1;
}

.window-header {
  padding:10px;
  background:rgba(255,255,255,0.05);
  display:flex;
  justify-content:space-between;
  cursor:move;
}

.window-body {
  flex:1;
  padding:10px;
  overflow:auto;
}

/* TERMINAL */
#terminalOutput {
  font-family: monospace;
}
#terminalInput {
  padding:10px;
  background:black;
  color:white;
  border:none;
  outline:none;
  width:100%;
}

/* CHROME */
.chrome-nav { display:flex; gap:5px; padding:5px;}
#urlBar { flex:1; padding:8px; border-radius:20px; border:none;}
iframe { flex:1; border:none; }

button {
  background:rgba(255,255,255,0.1);
  border:none;
  color:white;
  border-radius:6px;
  cursor:pointer;
}
</style>

</head>

<body>

<!-- SPLASH -->

<div id="splash">
  <div class="logo"><img src="logo.png"></div>
  <div class="loader"><div class="bar"></div></div>
</div>

<audio id="bootSound" src="startup.mp3"></audio>

<!-- TOPBAR -->

<div class="topbar">
  <div>Agesh K S</div>
  <div id="time"></div>
</div>

<!-- ICONS -->

<div class="desktop-icons">
  <div class="icon" onclick="openApp('terminal')">
    <img src="https://img.icons8.com/fluency/96/console.png"><p>Terminal</p>
  </div>
  <div class="icon" onclick="openApp('chrome')">
    <img src="https://img.icons8.com/fluency/96/chrome.png"><p>Chrome</p>
  </div>
  <div class="icon" onclick="openApp('finder')">
    <img src="https://img.icons8.com/fluency/96/folder-invoices.png"><p>Finder</p>
  </div>
  <div class="icon" onclick="openApp('cvWindow')">
    <img src="https://img.icons8.com/fluency/96/pdf.png"><p>My CV</p>
  </div>
</div>

<!-- TERMINAL -->

<div class="window" id="terminal">
  <div class="window-header" onmousedown="drag(event,this.parentElement)">
    Terminal <button onclick="closeApp('terminal')">✖</button>
  </div>
  <div id="terminalOutput" class="window-body"><p>> Welcome</p></div>
  <input id="terminalInput" type="text" autocomplete="off" placeholder="type command...">
</div>

<!-- FINDER -->

<div class="window" id="finder">
  <div class="window-header" onmousedown="drag(event,this.parentElement)">
    Finder <button onclick="closeApp('finder')">✖</button>
  </div>
  <div class="window-body">
    <p>🚀 Travel App</p>
    <p>🎮 Jet Game</p>
  </div>
</div>

<!-- CHROME -->

<div class="window" id="chrome">
  <div class="window-header" onmousedown="drag(event,this.parentElement)">
    Chrome <button onclick="closeApp('chrome')">✖</button>
  </div>
  <div class="chrome-nav">
    <button onclick="goBack()">←</button>
    <button onclick="goForward()">→</button>
    <button onclick="refreshPage()">⟳</button>
    <input id="urlBar">
  </div>
  <iframe id="browser"></iframe>
</div>

<!-- CV -->

<div class="window" id="cvWindow">
  <div class="window-header" onmousedown="drag(event,this.parentElement)">
    My CV
    <div>
      <button onclick="downloadCV()">⬇</button>
      <button onclick="closeApp('cvWindow')">✖</button>
    </div>
  </div>
  <iframe src="Ageshks.pdf"></iframe>
</div>

<!-- DOCK -->

<div class="dock">
  <img src="https://img.icons8.com/fluency/96/console.png" onclick="openApp('terminal')">
  <img src="https://img.icons8.com/fluency/96/chrome.png" onclick="openApp('chrome')">
</div>

<script>
setInterval(()=>document.getElementById("time").innerText=new Date().toLocaleTimeString(),1000);

let zIndex = 10;

function openApp(id){
  const el = document.getElementById(id);
  el.style.display = "flex";
  el.style.zIndex = ++zIndex;

  if(id === "terminal"){
    setTimeout(()=>{
      const input = document.getElementById("terminalInput");
      input.focus();
    },150);
  }
}

function closeApp(id){
  document.getElementById(id).style.display="none";
}

function drag(e,el){
  el.style.zIndex = ++zIndex;

  let x=e.clientX-el.offsetLeft,y=e.clientY-el.offsetTop;
  function move(ev){
    el.style.left=ev.pageX-x+"px";
    el.style.top=ev.pageY-y+"px";
  }
  document.addEventListener("mousemove",move);
  document.onmouseup=()=>document.removeEventListener("mousemove",move);
}

// TERMINAL
const terminalInput=document.getElementById("terminalInput");
const terminalOutput=document.getElementById("terminalOutput");

document.getElementById("terminal").addEventListener("click",()=>{
  terminalInput.focus();
});

terminalInput.addEventListener("keydown",function(e){
  if(e.key==="Enter"){
    let cmd=terminalInput.value.trim();
    terminalOutput.innerHTML+=`<p>> ${cmd}</p>`;
    runCommand(cmd);
    terminalInput.value="";
    terminalOutput.scrollTop=terminalOutput.scrollHeight;
  }
});

function runCommand(cmd){
  if(cmd==="help"){
    terminalOutput.innerHTML+=`<p>help | about | open chrome | open finder | open cv | clear</p>`;
  } else if(cmd==="about"){
    terminalOutput.innerHTML+=`<p>Agesh K S - Flutter Developer 🚀</p>`;
  } else if(cmd==="open chrome"){ openApp("chrome"); }
  else if(cmd==="open finder"){ openApp("finder"); }
  else if(cmd==="open cv"){ openApp("cvWindow"); }
  else if(cmd==="clear"){ terminalOutput.innerHTML=""; }
  else{
    terminalOutput.innerHTML+=`<p>command not found</p>`;
  }
}

// CHROME
const urlBar=document.getElementById("urlBar");
const browser=document.getElementById("browser");

urlBar.addEventListener("keydown",e=>{
  if(e.key==="Enter"){
    let v=urlBar.value;
    browser.src=v.includes(".")?(v.startsWith("http")?v:"https://"+v)
    :"https://www.bing.com/search?q="+encodeURIComponent(v);
  }
});

function goBack(){ browser.contentWindow.history.back(); }
function goForward(){ browser.contentWindow.history.forward(); }
function refreshPage(){ browser.contentWindow.location.reload(); }

function downloadCV(){
  const a=document.createElement("a");
  a.href="Ageshks.pdf";
  a.download="Ageshks.pdf";
  a.click();
}

// SPLASH FIX
window.onload=()=>{
  const splash=document.getElementById("splash");

  setTimeout(()=>{
    splash.style.opacity="0";
    splash.style.pointerEvents="none";
  },3000);

  setTimeout(()=>{
    splash.style.display="none";
  },3500);

  setTimeout(()=>{
    document.getElementById("bootSound").play().catch(()=>{});
  },500);
};
</script>

</body>
</html>
